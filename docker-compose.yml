services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sujal-portfolio
    ports:
      - "8080:80"
    read_only: true  # 🔒 OWASP D09: Immutable Paradigm
    tmpfs:
      - /var/cache/nginx:size=64m,uid=101,gid=101,mode=0755
      - /var/log/nginx:size=32m,uid=101,gid=101,mode=0755
      - /var/run:size=32m,uid=101,gid=101,mode=0755
      - /tmp:size=32m,uid=101,gid=101,mode=1777
      - /etc/nginx/temp:size=16m,uid=101,gid=101,mode=0755
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
